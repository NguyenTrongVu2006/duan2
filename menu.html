<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Menu</title>
    <script src="https://kit.fontawesome.com/acf634688a.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sofia"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 62.5%;
      }
      a,
      i {
        font-family: "Sofia", sans-serif;
        font-size: 1.5rem;
        color: #fff;
      }
      nav {
        background: green;
        width: 80%;
        margin: 0 auto;
        text-align: center;
        padding: 10px 0px;
      }
      nav ul li {
        display: inline-block;
        width: 15%;
        padding: 10px 0px;
      }
      nav ul li a {
        text-decoration: none;
        margin: 0px 0px 0px 10px;
      }
      nav ul li:hover {
        background: blue;
      }
      nav ul li:hover a {
        font-weight: bold;
        color: red;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><i class="fa-solid fa-house"></i><a href="#">Home</a></li>
        <li><i class="fa-solid fa-address-card"></i><a href="#">About</a></li>
        <li>
          <i class="fa-solid fa-cart-shopping"></i><a href="#">Products</a>
        </li>
        <li>
          <i class="fa-brands fa-servicestack"></i><a href="#">Services</a>
        </li>
        <li><i class="fa-solid fa-phone-volume"></i><a href="#">fultack</a></li>
      </ul>
    </nav>
  </body>
</html>
